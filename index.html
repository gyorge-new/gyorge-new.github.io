<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulas do Fabio Dias</title>
    <link rel="shortcut icon" href="./imgs/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Atma:wght@300;400;500;600;700&family=Delius&family=Knewave&display=swap" rel="stylesheet">
</head>
<body>
    <header>Atividades escolares</header>
    <div id="grid">
    </div>
    <script>
        const subreps = ["Front-End-2025","Slides-Diversos","Slides-ocultos"]
        const titulos = ["Front-End","Apresentações","Slides Ocultos"]
        const descricoes = [
            "Materia onde supostamente o Grande Fabio Dias ensina HTML e Java Script. Aqui está todos os Layouts que fiz durante tais aulas",
            "Diversos slides que fui fazendo durante os anos para ganhar nota em alguma materia",
            "Slides que me avisaram que eu tinha, porque eu não lembrava"
        ]
        
        const divumlayot = document.getElementById("grid")
        for (let i = 0; i < subreps.length; i++) {
            const repo = subreps[i]
            const descricao = descricoes[i]
            const titulo = titulos[i]
            
            divumlayot.innerHTML += `
            <div id="${repo}" class="bloco">
                <h3>${titulo}</h3>
                <a href="https://gyorge-escola.github.io/${repo}/">
                    <div id="${repo}" class="subloco">
                        <img src="https://gyorge-escola.github.io/${repo}/thumb.png" alt="">
                        <p>${descricao}</p>
                    </div>
                </a>
            </div>
            `
        }
    </script>
</body>
</html>
